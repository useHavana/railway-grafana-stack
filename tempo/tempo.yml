server:
  http_listen_port: 3200

compactor:
  compaction:
    compaction_window: 1h
    block_retention: 720h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/traces

metrics_generator:
  registry:
    external_labels:
      source: tempo
  processor:
    local_blocks:
      flush_to_storage: false
      max_block_duration: 5m
      complete_block_timeout: 1h
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus.railway.internal:9090/api/v1/write

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
        - local-blocks

distributor:
  log_received_spans:
        enabled: true
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"